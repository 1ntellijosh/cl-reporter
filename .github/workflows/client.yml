name: test-client-app

on:
  pull_request:
    paths:
      - 'client/**'
      - 'packages/common/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    # Not needed/used yet for client app tests
    # services:
    #   postgres:
    #     image: postgres:16
    #     env:
    #       POSTGRES_USER: postgres
    #       POSTGRES_PASSWORD: postgres
    #       POSTGRES_DB: cl_reporter_test
    #     ports:
    #       - 5432:5432
    #     options: >-
    #       --health-cmd "pg_isready -U postgres -d cl_reporter_test"
    #       --health-interval 5s
    #       --health-timeout 5s
    #       --health-retries 10

    # env:
    #   DATABASE_URL: postgresql://postgres:postgres@localhost:5432/cl_reporter_test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build shared packages
        run: |
          npm run build -w @reporter/common
      
      - name: Client Jest tests
        run: npm run test:ci -w client
