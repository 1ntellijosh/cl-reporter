# Lint/build/test. Integration tests use a real Postgres 16 service (no in-process substitute — see oauth-api/tests/JestSetup.integration.ts).
name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  oauth-api:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: cl_reporter_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d cl_reporter_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/cl_reporter_test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build workspace packages
        run: |
          npm run build -w @reporter/common
          npm run build -w @reporter/middleware

      - name: Apply Drizzle migrations
        run: npm run db:migrate -w @reporter/middleware

      - name: OAuth API unit tests
        run: npm run test:ci -w oauth-api

      - name: OAuth API integration tests
        run: npm run test:integration -w oauth-api
