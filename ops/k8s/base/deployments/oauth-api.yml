# ------------------------------------------------------------------------------------------------
# oauth-api k8s deployment file for cl-reporter project
#
# @since agentic-flow--JP
# ------------------------------------------------------------------------------------------------

apiVersion: apps/v1
kind: Deployment
metadata:
  name: oauth-api-dpl
  namespace: default
spec:
  replicas: 1 # for now
  selector:
    matchLabels:
      app: oauth-api
  template:
    metadata:
      labels:
        app: oauth-api
    spec:
      containers:
        - name: oauth-api
          image: 1ntellijosh/cl-reporter-oauth-api
          imagePullPolicy: IfNotPresent
          env:
            - name: DATABASE_URL
              value: postgresql://cl_reporter:cl_reporter_dev@cl-reporter-db-srv:5432/cl_reporter
            - name: RABBITMQ_CLIENT_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name # This will be the pod name
            - name: RABBITMQ_URL
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-url
                  key: RABBITMQ_URL

---

apiVersion: v1
kind: Service
metadata:
  name: oauth-api-srv
spec:
  selector:
    app: oauth-api
  ports:
    - name: oauth-api
      protocol: TCP
      port: 3000
      targetPort: 3000
