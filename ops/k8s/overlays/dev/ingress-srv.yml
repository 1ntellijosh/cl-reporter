# ------------------------------------------------------------------------------------------------
# Nginx ingress for local/dev (e.g. kind). For prod EKS use overlays/prod (ALB).
#
# @since app-skaffold--JP
# ------------------------------------------------------------------------------------------------

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ingress-srv
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
spec:
  ingressClassName: nginx
  rules:
    - host: reporter.com
      http:
        paths:
          # - path: /api/reports/[^/]+
          #   pathType: ImplementationSpecific
          #   backend:
          #     service:
          #       name: report-worker-srv
          #       port:
          #         number: 3000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: client-srv
                port:
                  number: 3000
